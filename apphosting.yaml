# Firebase App Hosting — backend id: biointel
# https://firebase.google.com/docs/app-hosting/configure
#
# Client Firebase web config is public-by-design (ends up in browser JS).
# Still: do NOT put the Google API key as a plain `value` in git — GitHub
# secret scanning flags AIza… patterns. Store it in Secret Manager instead.
# Admin SDK private keys: Secret Manager only, RUNTIME only.

runConfig:
  minInstances: 0
  # Molecule/discover fan-out is memory-hungry on cold starts
  memoryMiB: 1024
  # maxInstances: 20

env:
  # Web API key via Secret Manager (still injected as NEXT_PUBLIC_* at build).
  # Rotate/set: firebase apphosting:secrets:set NEXT_PUBLIC_FIREBASE_API_KEY --data-file - --force
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: kbiointelbrowser04052026.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: https://kbiointelbrowser04052026-default-rtdb.firebaseio.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: kbiointelbrowser04052026
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: kbiointelbrowser04052026.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "888935385467"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:888935385467:web:24d1b4fde75682ad5415de
    availability:
      - BUILD
      - RUNTIME

  # Server Admin SDK service-account JSON (Secret Manager — not committed).
  # Set/rotate: npm run firebase:apphosting:admin-secret
  - variable: FIREBASE_ADMIN_CREDENTIALS_JSON
    secret: FIREBASE_ADMIN_CREDENTIALS_JSON
    availability:
      - RUNTIME

  # Ollama Cloud fallback for AI brief / chat when localhost:11434 is absent.
  # Set: firebase apphosting:secrets:set OLLAMA_API_KEY --data-file - --force
  - variable: OLLAMA_API_KEY
    secret: OLLAMA_API_KEY
    availability:
      - RUNTIME

  # NCBI etiquette for PubChem/eutils from cloud egress
  - variable: NCBI_EMAIL
    value: kevinkicho@gmail.com
    availability:
      - BUILD
      - RUNTIME
