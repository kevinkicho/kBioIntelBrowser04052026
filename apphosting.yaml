# Firebase App Hosting — backend id: biointel
# https://firebase.google.com/docs/app-hosting/configure
#
# Client Firebase keys are public-by-design (embedded in browser).
# Admin SDK credentials must use Secret Manager, never plain values.

runConfig:
  minInstances: 0
  # Optional: raise if category/discover fan-out hits memory limits
  # memoryMiB: 1024
  # maxInstances: 20

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCoJCRE0IAxTHF_6bn63OGmigypQ-GLoXo
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: kbiointelbrowser04052026.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: https://kbiointelbrowser04052026-default-rtdb.firebaseio.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: kbiointelbrowser04052026
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: kbiointelbrowser04052026.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "888935385467"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:888935385467:web:24d1b4fde75682ad5415de
    availability:
      - BUILD
      - RUNTIME

  # Optional server Admin SDK — create with:
  #   firebase apphosting:secrets:set FIREBASE_ADMIN_CREDENTIALS_JSON
  # then uncomment:
  # - variable: FIREBASE_ADMIN_CREDENTIALS_JSON
  #   secret: FIREBASE_ADMIN_CREDENTIALS_JSON
  #   availability:
  #     - RUNTIME
