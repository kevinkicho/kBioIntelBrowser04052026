# Firebase App Hosting — backend id: biointel
# https://firebase.google.com/docs/app-hosting/configure#secret-parameters
#
# Per docs:
#   - Plain env:  variable + value  (+ optional availability BUILD/RUNTIME)
#   - Secrets:    variable + secret  (Cloud Secret Manager name)
#     create:  npx -y firebase-tools@latest apphosting:secrets:set <NAME>
#     grant:   npx -y firebase-tools@latest apphosting:secrets:grantaccess <NAME> -b biointel
#
# Console Settings → Environment shows only *console overrides* (can be empty).
# Real vars for a build: Rollout details → "Environment variables in this build".

runConfig:
  minInstances: 0
  memoryMiB: 1024

env:
  # --- Secret parameters (docs: secret: myApiKeySecret) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
  # Ollama: per-user API keys from the browser only — no server OLLAMA_API_KEY secret
  - variable: FIREBASE_ADMIN_CREDENTIALS_JSON
    secret: FIREBASE_ADMIN_CREDENTIALS_JSON
    availability:
      - RUNTIME

  # --- Plain values (BUILD + RUNTIME default when availability omitted) ---
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: kbiointelbrowser04052026.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_URL
    value: https://kbiointelbrowser04052026-default-rtdb.firebaseio.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: kbiointelbrowser04052026
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: kbiointelbrowser04052026.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "888935385467"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:888935385467:web:24d1b4fde75682ad5415de
  - variable: NCBI_EMAIL
    value: kevinkicho@gmail.com
  - variable: OLLAMA_CLOUD_BASE_URL
    value: https://ollama.com
